<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting...</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f0f0f;
color:white;
}

.container{
text-align:center;
background:#111;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,120,0.2);
max-width:400px;
width:90%;
}

h1{
color:#00ff88;
margin-bottom:10px;
}

p{
opacity:0.8;
margin-bottom:20px;
}

.loader{
border:5px solid #222;
border-top:5px solid #00ff88;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

button{
background:#00ff88;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00cc6a;
}

.count{
color:#00ff88;
font-weight:bold;
}
</style>

<script>

let time = 5;

function updateTimer(){
document.getElementById("count").innerText = time;

if(time === 0){
window.location.href = "https://n1luxtools.byethost7.com";
}

time--;
}

setInterval(updateTimer,1000);

function redirectNow(){
window.location.href = "https://n1luxtools.byethost7.com";
}

</script>

</head>

<body>

<div class="container">

<h1>Redirecting...</h1>

<p>You will be redirected in <span class="count" id="count">5</span> seconds</p>

<div class="loader"></div>

<p>If redirect doesn't work click below</p>

<button onclick="redirectNow()">Go to Website</button>

</div>

</body>
</html>
